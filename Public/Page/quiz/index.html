<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memora - Quiz</title>
    <link rel="stylesheet" href="../../Assets/Styles/main.css">
</head>
<style>
    .answered {
        background-color: grey;
    }

    .not-answered {
        background-color: transparent;
    }
</style>
<script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        options: {
            skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
        }
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<body>
    <header>
        <h1>Memora</h1>
    </header>
    <aside>
        <div id="question-grid">

        </div>
    </aside>
    <main class="center">
        <div>
            <p><span id="current-problem"></span>/<span id="total-problem"></span></p>
            <p id="problem"></p>
            <div class="buttons quiz-links">
                <button id="btn-prev">Prev</button>
                <button id="btn-clear">Clear</button>
                <button id="btn-next">Next</button>
            </div>
        </div>

    </main>
    <footer>
        Created by JoxNeis @2026
    </footer>
</body>
<script type="module" src="controller.js"></script>
<script type="module">
    import QuizService from "../../../App/Service/QuizService.js";
    import QuizPageController from "./controller.js";
    document.addEventListener("DOMContentLoaded", () => {
        const controller = new QuizPageController(new QuizService());
    });
</script>

</html>
